<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GOLO Demo</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f7f7f7;
        color: #111;
      }
      .wrap {
        max-width: 420px;
        margin: 0 auto;
        background: white;
        min-height: 100vh;
      }
      .header {
        background: #16a34a;
        color: white;
        padding: 20px;
        font-size: 28px;
        font-weight: bold;
      }
      .section {
        padding: 16px;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e5e5;
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 14px;
        box-shadow: 0 2px 8px rgba(0,0,0,.04);
      }
      .btn {
        width: 100%;
        background: #16a34a;
        color: white;
        border: 0;
        border-radius: 12px;
        padding: 14px;
        font-size: 16px;
        font-weight: 600;
      }
      .muted { color: #666; }
      .pill {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: #dcfce7;
        color: #166534;
        font-size: 13px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">GOLO</div>

      <div class="section">
        <div class="card">
          <h2>Downtown Burger</h2>
          <p class="muted">25-35 min • $2.99 delivery</p>
          <button class="btn" onclick="placeOrder()">Place Demo Order</button>
        </div>

        <div class="card">
          <h3>Your order</h3>
          <p>Burger Combo</p>
          <p class="pill" id="status">Preparing</p>
        </div>
      </div>
    </div>

    <script>
      const steps = ["Preparing", "Ready for Pickup", "Picked Up", "On the Way", "Delivered"];
      let i = 0;

      function placeOrder() {
        i = 0;
        document.getElementById("status").textContent = steps[i];
        const timer = setInterval(() => {
          i++;
          if (i < steps.length) {
            document.getElementById("status").textContent = steps[i];
          } else {
            clearInterval(timer);
          }
        }, 2000);
      }
    </script>
  </body>
</html>
