<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GOLO Store</title>
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0a0a0a;
        color: #111;
      }
      .app {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        background: #f7f7f7;
        padding-bottom: 110px;
      }

      .hero {
        color: white;
        padding: 18px 18px 26px;
        border-bottom-left-radius: 28px;
        border-bottom-right-radius: 28px;
      }
      .hero.pacsun { background: linear-gradient(135deg, #2b2b2b, #5b5b5b); }
      .hero.brigade { background: linear-gradient(135deg, #30150c, #c85b18); }
      .hero.nxt { background: linear-gradient(135deg, #0b2f6b, #0ea5e9); }
      .hero.exhibition { background: linear-gradient(135deg, #3f155e, #d91f72); }
      .hero.dtlr { background: linear-gradient(135deg, #0d4020, #22c55e); }
      .hero.nordstrom { background: linear-gradient(135deg, #111, #3c3c3c); }

      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
      }
      .back {
        color: white;
        text-decoration: none;
        font-size: 14px;
        font-weight: 700;
      }
      .logo {
        height: 28px;
      }
      .store-title {
        font-size: 30px;
        font-weight: 900;
        margin: 0 0 8px;
      }
      .store-meta {
        font-size: 14px;
        opacity: .92;
        margin-bottom: 14px;
      }
      .hero-tags {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .hero-tag {
        background: rgba(255,255,255,.16);
        border: 1px solid rgba(255,255,255,.12);
        padding: 8px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
      }

      .section {
        padding: 18px;
      }
      .section-title {
        margin: 0 0 14px;
        font-size: 20px;
        font-weight: 800;
      }
      .chips {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 4px;
      }
      .chips::-webkit-scrollbar { display: none; }
      .chip {
        white-space: nowrap;
        background: white;
        border: 1px solid #ececec;
        padding: 10px 14px;
        border-radius: 999px;
        font-size: 13px;
        color: #222;
        box-shadow: 0 6px 18px rgba(0,0,0,.04);
      }

      .items {
        display: grid;
        gap: 16px;
      }
      .item-card {
        background: white;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0,0,0,.08);
      }
      .item-image {
  height: 160px;
  border-bottom: 1px solid #eee;
  overflow: hidden;
  border-top-left-radius: 24px;
  border-top-right-radius: 24px;
}
      .img-0 { background: linear-gradient(135deg, #111, #444); }
      .img-1 { background: linear-gradient(135deg, #1f2937, #6b7280); }
      .img-2 { background: linear-gradient(135deg, #111827, #16a34a); }

      .item-body {
        padding: 16px;
      }
      .item-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
      }
      .item-name {
        font-size: 19px;
        font-weight: 800;
        margin: 0 0 6px;
      }
      .item-desc {
        color: #666;
        font-size: 14px;
        margin-bottom: 12px;
      }
      .price {
        font-weight: 800;
        font-size: 16px;
      }
      .add-btn {
        border: 0;
        background: #111;
        color: white;
        border-radius: 14px;
        padding: 11px 14px;
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
      }

      .cart-bar {
        position: fixed;
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%);
        width: min(448px, calc(100% - 24px));
        background: rgba(17,17,17,.96);
        color: white;
        border-radius: 22px;
        padding: 14px 16px;
        display: none;
        box-shadow: 0 16px 40px rgba(0,0,0,.28);
      }
      .cart-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .cart-meta {
        font-size: 13px;
        color: rgba(255,255,255,.72);
        margin-top: 4px;
      }
      .cart-btn {
        background: white;
        color: #111;
        border: 0;
        border-radius: 14px;
        padding: 11px 14px;
        font-weight: 800;
        cursor: pointer;
      }

      .panel {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.5);
        display: none;
        align-items: flex-end;
        justify-content: center;
      }
      .sheet {
        width: min(480px, 100%);
        background: #fff;
        border-radius: 26px 26px 0 0;
        padding: 18px;
        max-height: 90vh;
        overflow: auto;
      }
      .sheet h3 {
        margin: 0 0 14px;
        font-size: 24px;
      }
      .cart-item {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 0;
        border-bottom: 1px solid #eee;
      }
      .muted {
        color: #6b7280;
        font-size: 14px;
      }
      .summary-row {
        display: flex;
        justify-content: space-between;
        margin: 12px 0;
      }
      .delivery-option {
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        padding: 14px;
        margin-bottom: 10px;
        cursor: pointer;
      }
      .delivery-option.active {
        border-color: #111;
        background: #f3f4f6;
      }
      .primary-btn {
        width: 100%;
        background: #111;
        color: white;
        border: 0;
        border-radius: 16px;
        padding: 15px;
        font-size: 16px;
        font-weight: 800;
        margin-top: 14px;
        cursor: pointer;
      }
      .secondary-btn {
        width: 100%;
        background: #f3f4f6;
        color: #111827;
        border: 0;
        border-radius: 16px;
        padding: 13px;
        font-size: 15px;
        font-weight: 800;
        margin-top: 10px;
        cursor: pointer;
      }
      .remove-btn {
        margin-top: 8px;
        border: 0;
        background: #111;
        color: white;
        border-radius: 10px;
        padding: 7px 10px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div id="hero" class="hero">
        <div class="top-row">
          <a class="back" href="index.html">← Back</a>
          <img src="logo.png" alt="GOLO logo" class="logo" />
        </div>
        <h1 class="store-title" id="storeName">Store</h1>
        <div class="store-meta" id="storeMeta">Fast delivery near you</div>
        <div class="hero-tags">
          <div class="hero-tag">Premium</div>
          <div class="hero-tag">Express Available</div>
          <div class="hero-tag">Tracked Delivery</div>
        </div>
      </div>

      <div class="section">
        <h2 class="section-title">Shop by category</h2>
        <div class="chips">
          <div class="chip">New Arrivals</div>
          <div class="chip">Best Sellers</div>
          <div class="chip">Footwear</div>
          <div class="chip">Apparel</div>
          <div class="chip">Accessories</div>
        </div>
      </div>

      <div class="section">
        <h2 class="section-title">Featured items</h2>
        <div id="items" class="items"></div>
      </div>
    </div>

    <div id="cartBar" class="cart-bar">
      <div class="cart-row">
        <div>
          <div><strong id="cartCount">0 items</strong></div>
          <div class="cart-meta">Subtotal: <span id="cartSubtotal">$0.00</span></div>
        </div>
        <button class="cart-btn" onclick="openCart()">View Cart</button>
      </div>
    </div>

    <div id="panel" class="panel">
      <div class="sheet" id="sheet"></div>
    </div>

    <script>
      const stores = {
        pacsun: {
          name: "PacSun",
          theme: "pacsun",
          meta: "Casualwear • 25-40 min • $4.99 delivery",
          items: [
            {
  name: "Obscura Cropped Zip Hoodie",
  desc: "Heather gray cropped full-zip hoodie from PacSun",
  price: 64.95,
  image: "https://www.pacsun.com/on/demandware.static/-/Sites-pacsun-master/default/dw6e3c6a/images/large/0193519270036_367.jpg"
},
            { name: "Baggy Jeans", desc: "Loose fit denim", price: 68, emoji: "👖" },
            { name: "Essential Hoodie", desc: "Fleece pullover hoodie", price: 55, emoji: "🧥" }
          ]
        },
        brigade: {
          name: "Brigade",
          theme: "brigade",
          meta: "Streetwear • 30-45 min • $5.99 delivery",
          items: [
            { name: "Cargo Pants", desc: "Utility fit streetwear cargos", price: 74, emoji: "👖" },
            { name: "Varsity Jacket", desc: "Heavyweight statement piece", price: 120, emoji: "🧥" },
            { name: "Oversized Tee", desc: "Drop-shoulder fit", price: 40, emoji: "👕" }
          ]
        },
        nxt: {
          name: "NXT",
          theme: "nxt",
          meta: "Sneakers • 20-35 min • $6.49 delivery",
          items: [
            { name: "Retro Runner", desc: "Classic sneaker silhouette", price: 110, emoji: "👟" },
            { name: "Low Top Essential", desc: "Everyday casual pair", price: 95, emoji: "👟" },
            { name: "Performance Trainer", desc: "Cushioned training shoe", price: 130, emoji: "🥾" }
          ]
        },
        exhibition: {
          name: "Exhibition",
          theme: "exhibition",
          meta: "Premium Fashion • 35-50 min • $7.99 delivery",
          items: [
            { name: "Designer Crewneck", desc: "Premium heavyweight fleece", price: 145, emoji: "🧥" },
            { name: "Luxury Cap", desc: "Structured premium cap", price: 60, emoji: "🧢" },
            { name: "Statement Pants", desc: "Tailored fashion fit", price: 165, emoji: "👖" }
          ]
        },
        dtlr: {
          name: "DTLR",
          theme: "dtlr",
          meta: "Footwear • 25-35 min • $5.49 delivery",
          items: [
            { name: "Lifestyle Sneaker", desc: "Versatile daily pair", price: 98, emoji: "👟" },
            { name: "Running Shoe", desc: "Comfort-focused runner", price: 125, emoji: "👟" },
            { name: "Slides", desc: "Casual quick-wear slides", price: 35, emoji: "🩴" }
          ]
        },
        nordstrom: {
          name: "Nordstrom",
          theme: "nordstrom",
          meta: "Department Store • 40-60 min • $8.99 delivery",
          items: [
            { name: "Leather Wallet", desc: "Classic everyday carry", price: 78, emoji: "👛" },
            { name: "Fragrance Set", desc: "Gift-ready fragrance bundle", price: 95, emoji: "🧴" },
            { name: "Premium Sneakers", desc: "Fashion-forward footwear", price: 150, emoji: "👟" }
          ]
        }
      };

      const params = new URLSearchParams(window.location.search);
      const storeKey = params.get("store") || "pacsun";
      const store = stores[storeKey] || stores.pacsun;

      function getCart() {
        return JSON.parse(localStorage.getItem("goloCart") || "[]");
      }

      function saveCart(cart) {
        localStorage.setItem("goloCart", JSON.stringify(cart));
      }

      function clearCart() {
        localStorage.removeItem("goloCart");
      }

      function formatMoney(value) {
        return `$${value.toFixed(2)}`;
      }

      document.getElementById("storeName").textContent = store.name;
      document.getElementById("storeMeta").textContent = store.meta;
      document.getElementById("hero").classList.add(store.theme);

      const itemsEl = document.getElementById("items");

      store.items.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "item-card";
        card.innerHTML = `
          <div class="item-image">
  ${item.image 
    ? `<img src="${item.image}" style="width:100%;height:100%;object-fit:cover;">`
    : item.emoji || "🛍️"}
</div>
          <div class="item-body">
            <div class="item-top">
              <div>
                <div class="item-name">${item.name}</div>
                <div class="item-desc">${item.desc}</div>
                <div class="price">${formatMoney(item.price)}</div>
              </div>
              <button class="add-btn" onclick="addToCart(${index})">Add</button>
            </div>
          </div>
        `;
        itemsEl.appendChild(card);
      });

      function addToCart(index) {
        const cart = getCart();
        const item = store.items[index];
        cart.push({
          ...item,
          storeKey,
          storeName: store.name
        });
        saveCart(cart);
        updateCart();
      }

      function updateCart() {
        const cart = getCart();
        const count = cart.length;
        const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
        document.getElementById("cartCount").textContent = `${count} item${count !== 1 ? "s" : ""}`;
        document.getElementById("cartSubtotal").textContent = formatMoney(subtotal);
        document.getElementById("cartBar").style.display = count ? "block" : "none";
      }

      function openCart() {
        const cart = getCart();
        const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
        const sheet = document.getElementById("sheet");

        sheet.innerHTML = `
          <h3>Your Cart</h3>
          ${cart.map((item, i) => `
            <div class="cart-item">
              <div>
                <strong>${item.name}</strong>
                <div class="muted">${item.desc}</div>
                <div class="muted">${item.storeName}</div>
              </div>
              <div>
                <strong>${formatMoney(item.price)}</strong>
                <button class="remove-btn" onclick="removeItem(${i})">Remove</button>
              </div>
            </div>
          `).join("") || `<div class="muted">Your cart is empty.</div>`}
          <div class="summary-row"><span>Subtotal</span><strong>${formatMoney(subtotal)}</strong></div>
          <button class="primary-btn" onclick="openCheckout()" ${cart.length ? "" : "disabled"}>Continue to Checkout</button>
          <button class="secondary-btn" onclick="closePanel()">Close</button>
        `;
        document.getElementById("panel").style.display = "flex";
      }

      function removeItem(index) {
        const cart = getCart();
        cart.splice(index, 1);
        saveCart(cart);
        updateCart();
        openCart();
      }

      function openCheckout() {
        const cart = getCart();
        const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
        const expressFee = 14.99;
        const priorityFee = 7.99;

        const sheet = document.getElementById("sheet");
        sheet.innerHTML = `
          <h3>Checkout</h3>
          <div class="muted" style="margin-bottom:14px;">Choose your delivery option</div>

          <div class="delivery-option active" id="expressOption" onclick="selectDelivery('express')">
            <strong>Express</strong>
            <div class="muted">Within 1 hour</div>
            <div><strong>${formatMoney(expressFee)}</strong></div>
          </div>

          <div class="delivery-option" id="priorityOption" onclick="selectDelivery('priority')">
            <strong>Priority</strong>
            <div class="muted">2-3 hours</div>
            <div><strong>${formatMoney(priorityFee)}</strong></div>
          </div>

          <div class="summary-row"><span>Items</span><strong>${formatMoney(subtotal)}</strong></div>
          <div class="summary-row"><span>Delivery</span><strong id="deliveryFee">${formatMoney(expressFee)}</strong></div>
          <div class="summary-row"><span>Total</span><strong id="totalFee">${formatMoney(subtotal + expressFee)}</strong></div>

          <button class="primary-btn" onclick="placeOrder()">Place Order</button>
          <button class="secondary-btn" onclick="openCart()">Back to Cart</button>
        `;

        window.selectedDelivery = "express";
        window.subtotalAmount = subtotal;
        window.expressFee = expressFee;
        window.priorityFee = priorityFee;
      }

      function selectDelivery(type) {
        window.selectedDelivery = type;
        document.getElementById("expressOption").classList.toggle("active", type === "express");
        document.getElementById("priorityOption").classList.toggle("active", type === "priority");

        const fee = type === "express" ? window.expressFee : window.priorityFee;
        document.getElementById("deliveryFee").textContent = formatMoney(fee);
        document.getElementById("totalFee").textContent = formatMoney(window.subtotalAmount + fee);
      }

      function placeOrder() {
        const cart = getCart();
        const deliveryText = window.selectedDelivery === "express" ? "Within 1 hour" : "2-3 hours";
        const fee = window.selectedDelivery === "express" ? window.expressFee : window.priorityFee;
        const total = window.subtotalAmount + fee;

        const order = {
          storeName: cart[0]?.storeName || store.name,
          items: cart,
          subtotal: window.subtotalAmount,
          deliveryType: window.selectedDelivery,
          deliveryLabel: deliveryText,
          deliveryFee: fee,
          total
        };

        localStorage.setItem("goloOrder", JSON.stringify(order));
        localStorage.setItem("goloStatusIndex", "0");
        clearCart();
        window.location.href = "tracking.html";
      }

      function closePanel() {
        document.getElementById("panel").style.display = "none";
      }

      document.getElementById("panel").addEventListener("click", (e) => {
        if (e.target.id === "panel") closePanel();
      });

      updateCart();
    </script>
  </body>
</html>
