<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GOLO Store</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f6f7fb;
        color: #111827;
      }
      .app {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        background: #fff;
        padding-bottom: 100px;
      }
      .hero {
        color: white;
        padding: 22px 18px 26px;
      }
      .hero.pacsun { background: linear-gradient(135deg, #1f2937, #4b5563); }
      .hero.brigade { background: linear-gradient(135deg, #7c2d12, #ea580c); }
      .hero.nxt { background: linear-gradient(135deg, #1d4ed8, #06b6d4); }
      .hero.exhibition { background: linear-gradient(135deg, #581c87, #db2777); }
      .hero.dtlr { background: linear-gradient(135deg, #166534, #22c55e); }
      .hero.nordstrom { background: linear-gradient(135deg, #111827, #374151); }

      .back {
        display: inline-block;
        color: white;
        text-decoration: none;
        margin-bottom: 14px;
        font-size: 14px;
      }
      .store-title {
        font-size: 28px;
        font-weight: 800;
        margin: 0 0 8px;
      }
      .store-meta {
        font-size: 14px;
        opacity: 0.95;
      }
      .section {
        padding: 18px;
      }
      .section h2 {
        margin: 0 0 14px;
        font-size: 20px;
      }
      .chips {
        display: flex;
        gap: 8px;
        overflow-x: auto;
      }
      .chip {
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
        padding: 8px 12px;
        border-radius: 999px;
        white-space: nowrap;
        font-size: 13px;
      }
      .items {
        display: grid;
        gap: 14px;
      }
      .item-card {
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        padding: 14px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.05);
      }
      .item-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }
      .item-name {
        font-size: 18px;
        font-weight: 700;
        margin: 0 0 6px;
      }
      .item-desc {
        color: #6b7280;
        font-size: 14px;
        margin-bottom: 10px;
      }
      .price {
        font-weight: 700;
        font-size: 16px;
      }
      .btn {
        border: 0;
        background: #16a34a;
        color: white;
        border-radius: 12px;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }
      .cart-bar {
        position: fixed;
        left: 50%;
        bottom: 14px;
        transform: translateX(-50%);
        width: min(448px, calc(100% - 24px));
        background: #111827;
        color: white;
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.18);
        display: none;
      }
      .cart-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .cart-btn {
        background: #16a34a;
        color: white;
        border: 0;
        border-radius: 12px;
        padding: 10px 14px;
        font-weight: 700;
        cursor: pointer;
      }
      .panel {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        display: none;
        align-items: flex-end;
        justify-content: center;
      }
      .sheet {
        width: min(480px, 100%);
        background: white;
        border-radius: 22px 22px 0 0;
        padding: 18px;
        max-height: 90vh;
        overflow: auto;
      }
      .sheet h3 {
        margin-top: 0;
        font-size: 22px;
      }
      .cart-item {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid #eee;
      }
      .muted {
        color: #6b7280;
        font-size: 14px;
      }
      .summary-row {
        display: flex;
        justify-content: space-between;
        margin: 10px 0;
      }
      .delivery-option {
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 10px;
        cursor: pointer;
      }
      .delivery-option.active {
        border-color: #16a34a;
        background: #ecfdf5;
      }
      .checkout-btn {
        width: 100%;
        background: #16a34a;
        color: white;
        border: 0;
        border-radius: 14px;
        padding: 14px;
        font-size: 16px;
        font-weight: 700;
        margin-top: 14px;
        cursor: pointer;
      }
      .close-btn {
        width: 100%;
        background: #f3f4f6;
        color: #111827;
        border: 0;
        border-radius: 14px;
        padding: 12px;
        font-size: 15px;
        font-weight: 700;
        margin-top: 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div id="hero" class="hero">
        <a class="back" href="index.html">← Back to stores</a>
        <h1 class="store-title" id="storeName">Store</h1>
        <div class="store-meta" id="storeMeta">Fast delivery near you</div>
      </div>

      <div class="section">
        <h2>Categories</h2>
        <div class="chips">
          <div class="chip">New Arrivals</div>
          <div class="chip">Best Sellers</div>
          <div class="chip">Sneakers</div>
          <div class="chip">Apparel</div>
          <div class="chip">Accessories</div>
        </div>
      </div>

      <div class="section">
        <h2>Popular items</h2>
        <div id="items" class="items"></div>
      </div>
    </div>

    <div id="cartBar" class="cart-bar">
      <div class="cart-row">
        <div>
          <div><strong id="cartCount">0 items</strong></div>
          <div class="muted" style="color:#d1d5db;">Subtotal: <span id="cartSubtotal">$0.00</span></div>
        </div>
        <button class="cart-btn" onclick="openCart()">View Cart</button>
      </div>
    </div>

    <div id="panel" class="panel">
      <div class="sheet" id="sheet"></div>
    </div>

    <script>
      const stores = {
        pacsun: {
          name: "PacSun",
          theme: "pacsun",
          meta: "Casualwear • 25-40 min • $4.99 delivery",
          items: [
            { name: "Graphic Tee", desc: "Relaxed fit cotton tee", price: 32 },
            { name: "Baggy Jeans", desc: "Loose fit denim", price: 68 },
            { name: "Essential Hoodie", desc: "Fleece pullover hoodie", price: 55 }
          ]
        },
        brigade: {
          name: "Brigade",
          theme: "brigade",
          meta: "Streetwear • 30-45 min • $5.99 delivery",
          items: [
            { name: "Cargo Pants", desc: "Utility fit streetwear cargos", price: 74 },
            { name: "Varsity Jacket", desc: "Heavyweight statement piece", price: 120 },
            { name: "Oversized Tee", desc: "Drop-shoulder fit", price: 40 }
          ]
        },
        nxt: {
          name: "NXT",
          theme: "nxt",
          meta: "Sneakers • 20-35 min • $6.49 delivery",
          items: [
            { name: "Retro Runner", desc: "Classic sneaker silhouette", price: 110 },
            { name: "Low Top Essential", desc: "Everyday casual pair", price: 95 },
            { name: "Performance Trainer", desc: "Cushioned training shoe", price: 130 }
          ]
        },
        exhibition: {
          name: "Exhibition",
          theme: "exhibition",
          meta: "Premium Fashion • 35-50 min • $7.99 delivery",
          items: [
            { name: "Designer Crewneck", desc: "Premium heavyweight fleece", price: 145 },
            { name: "Luxury Cap", desc: "Structured premium cap", price: 60 },
            { name: "Statement Pants", desc: "Tailored fashion fit", price: 165 }
          ]
        },
        dtlr: {
          name: "DTLR",
          theme: "dtlr",
          meta: "Footwear • 25-35 min • $5.49 delivery",
          items: [
            { name: "Lifestyle Sneaker", desc: "Versatile daily pair", price: 98 },
            { name: "Running Shoe", desc: "Comfort-focused runner", price: 125 },
            { name: "Slides", desc: "Casual quick-wear slides", price: 35 }
          ]
        },
        nordstrom: {
          name: "Nordstrom",
          theme: "nordstrom",
          meta: "Department Store • 40-60 min • $8.99 delivery",
          items: [
            { name: "Leather Wallet", desc: "Classic everyday carry", price: 78 },
            { name: "Fragrance Set", desc: "Gift-ready fragrance bundle", price: 95 },
            { name: "Premium Sneakers", desc: "Fashion-forward footwear", price: 150 }
          ]
        }
      };

      const params = new URLSearchParams(window.location.search);
      const storeKey = params.get("store") || "pacsun";
      const store = stores[storeKey] || stores.pacsun;

      function getCart() {
        return JSON.parse(localStorage.getItem("goloCart") || "[]");
      }

      function saveCart(cart) {
        localStorage.setItem("goloCart", JSON.stringify(cart));
      }

      function clearCart() {
        localStorage.removeItem("goloCart");
      }

      function formatMoney(value) {
        return `$${value.toFixed(2)}`;
      }

      document.getElementById("storeName").textContent = store.name;
      document.getElementById("storeMeta").textContent = store.meta;
      document.getElementById("hero").classList.add(store.theme);

      const itemsEl = document.getElementById("items");

      store.items.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "item-card";
        card.innerHTML = `
          <div class="item-top">
            <div>
              <div class="item-name">${item.name}</div>
              <div class="item-desc">${item.desc}</div>
              <div class="price">${formatMoney(item.price)}</div>
            </div>
            <div>
              <button class="btn" onclick="addToCart(${index})">Add</button>
            </div>
          </div>
        `;
        itemsEl.appendChild(card);
      });

      function addToCart(index) {
        const cart = getCart();
        const item = store.items[index];
        cart.push({
          ...item,
          storeKey,
          storeName: store.name
        });
        saveCart(cart);
        updateCart();
      }

      function updateCart() {
        const cart = getCart();
        const count = cart.length;
        const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
        document.getElementById("cartCount").textContent = `${count} item${count !== 1 ? "s" : ""}`;
        document.getElementById("cartSubtotal").textContent = formatMoney(subtotal);
        document.getElementById("cartBar").style.display = count ? "block" : "none";
      }

      function openCart() {
        const cart = getCart();
        const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
        const sheet = document.getElementById("sheet");

        sheet.innerHTML = `
          <h3>Your Cart</h3>
          ${cart.map((item, i) => `
            <div class="cart-item">
              <div>
                <strong>${item.name}</strong>
                <div class="muted">${item.desc}</div>
                <div class="muted">${item.storeName}</div>
              </div>
              <div>
                <strong>${formatMoney(item.price)}</strong>
                <div style="margin-top:8px;">
                  <button class="btn" style="padding:6px 10px;" onclick="removeItem(${i})">Remove</button>
                </div>
              </div>
            </div>
          `).join("") || `<div class="muted">Your cart is empty.</div>`}
          <div class="summary-row"><span>Subtotal</span><strong>${formatMoney(subtotal)}</strong></div>
          <button class="checkout-btn" onclick="openCheckout()" ${cart.length ? "" : "disabled"}>Continue to Checkout</button>
          <button class="close-btn" onclick="closePanel()">Close</button>
        `;
        document.getElementById("panel").style.display = "flex";
      }

      function removeItem(index) {
        const cart = getCart();
        cart.splice(index, 1);
        saveCart(cart);
        updateCart();
        openCart();
      }

      function openCheckout() {
        const cart = getCart();
        const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
        const expressFee = 14.99;
        const priorityFee = 7.99;

        const sheet = document.getElementById("sheet");
        sheet.innerHTML = `
          <h3>Checkout</h3>
          <div class="muted" style="margin-bottom:14px;">Choose your delivery option</div>

          <div class="delivery-option active" id="expressOption" onclick="selectDelivery('express')">
            <strong>Express</strong>
            <div class="muted">Within 1 hour</div>
            <div><strong>${formatMoney(expressFee)}</strong></div>
          </div>

          <div class="delivery-option" id="priorityOption" onclick="selectDelivery('priority')">
            <strong>Priority</strong>
            <div class="muted">2-3 hours</div>
            <div><strong>${formatMoney(priorityFee)}</strong></div>
          </div>

          <div class="summary-row"><span>Items</span><strong>${formatMoney(subtotal)}</strong></div>
          <div class="summary-row"><span>Delivery</span><strong id="deliveryFee">${formatMoney(expressFee)}</strong></div>
          <div class="summary-row"><span>Total</span><strong id="totalFee">${formatMoney(subtotal + expressFee)}</strong></div>

          <button class="checkout-btn" onclick="placeOrder()">Place Order</button>
          <button class="close-btn" onclick="openCart()">Back to Cart</button>
        `;

        window.selectedDelivery = "express";
        window.subtotalAmount = subtotal;
        window.expressFee = expressFee;
        window.priorityFee = priorityFee;
      }

      function selectDelivery(type) {
        window.selectedDelivery = type;
        document.getElementById("expressOption").classList.toggle("active", type === "express");
        document.getElementById("priorityOption").classList.toggle("active", type === "priority");

        const fee = type === "express" ? window.expressFee : window.priorityFee;
        document.getElementById("deliveryFee").textContent = formatMoney(fee);
        document.getElementById("totalFee").textContent = formatMoney(window.subtotalAmount + fee);
      }

      function placeOrder() {
        const cart = getCart();
        const deliveryText = window.selectedDelivery === "express" ? "Within 1 hour" : "2-3 hours";
        const fee = window.selectedDelivery === "express" ? window.expressFee : window.priorityFee;
        const total = window.subtotalAmount + fee;

        const order = {
          storeName: cart[0]?.storeName || store.name,
          items: cart,
          subtotal: window.subtotalAmount,
          deliveryType: window.selectedDelivery,
          deliveryLabel: deliveryText,
          deliveryFee: fee,
          total
        };

        localStorage.setItem("goloOrder", JSON.stringify(order));
        clearCart();
        window.location.href = "tracking.html";
      }

      function closePanel() {
        document.getElementById("panel").style.display = "none";
      }

      document.getElementById("panel").addEventListener("click", (e) => {
        if (e.target.id === "panel") closePanel();
      });

      updateCart();
    </script>
  </body>
</html>
