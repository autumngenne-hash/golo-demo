<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GOLO Tracking</title>
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0a0a0a;
        color: #111;
      }
      .app {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        background: #f7f7f7;
        padding-bottom: 24px;
      }
      .header {
        background: linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.65)),
                    linear-gradient(135deg, #111, #2a2a2a);
        color: white;
        padding: 18px 18px 28px;
        border-bottom-left-radius: 28px;
        border-bottom-right-radius: 28px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
      }
      .back {
        color: white;
        text-decoration: none;
        font-size: 14px;
        font-weight: 700;
      }
      .logo {
        height: 30px;
      }
      .title {
        font-size: 30px;
        font-weight: 900;
        margin: 0 0 8px;
      }
      .subtitle {
        color: rgba(255,255,255,.8);
        font-size: 14px;
      }
      .section {
        padding: 18px;
      }
      .card {
        background: white;
        border-radius: 24px;
        padding: 16px;
        margin-bottom: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,.08);
      }
      .store-name {
        font-size: 24px;
        font-weight: 900;
        margin-bottom: 8px;
      }
      .muted {
        color: #6b7280;
        font-size: 14px;
      }
      .status-pill {
        display: inline-block;
        background: #111;
        color: white;
        padding: 9px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        margin-top: 10px;
      }
      .map {
        position: relative;
        height: 240px;
        border-radius: 22px;
        overflow: hidden;
        background:
          linear-gradient(90deg, transparent 48%, rgba(255,255,255,.7) 48%, rgba(255,255,255,.7) 52%, transparent 52%),
          linear-gradient(0deg, transparent 48%, rgba(255,255,255,.7) 48%, rgba(255,255,255,.7) 52%, transparent 52%),
          linear-gradient(135deg, #dbeafe, #e5e7eb);
      }
      .road {
        position: absolute;
        background: rgba(255,255,255,.95);
        border-radius: 999px;
      }
      .road.h1 { top: 55px; left: 20px; width: 300px; height: 10px; }
      .road.h2 { top: 145px; left: 80px; width: 320px; height: 10px; }
      .road.v1 { top: 20px; left: 85px; width: 10px; height: 180px; }
      .road.v2 { top: 30px; left: 250px; width: 10px; height: 170px; }

      .pin {
        position: absolute;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        box-shadow: 0 8px 20px rgba(0,0,0,.18);
      }
      .store-pin {
        left: 52px;
        top: 42px;
        background: #111;
        color: white;
      }
      .home-pin {
        right: 28px;
        bottom: 32px;
        background: #16a34a;
        color: white;
      }
      .courier {
        position: absolute;
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: #111;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        left: 60px;
        top: 50px;
        box-shadow: 0 12px 24px rgba(0,0,0,.25);
        transition: all 1.2s ease;
      }
      .summary-item {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .btn {
        width: 100%;
        background: #111;
        color: white;
        border: 0;
        border-radius: 16px;
        padding: 15px;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
        margin-top: 10px;
      }
      .btn.secondary {
        background: #ececec;
        color: #111;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div class="topbar">
          <a class="back" href="index.html">← Back</a>
          <img src="./logo.png" alt="GOLO logo" class="logo" />
        </div>
        <h1 class="title">Track Order</h1>
        <div class="subtitle">Live GOLO delivery updates</div>
      </div>

      <div class="section" id="content"></div>
    </div>

    <script>
      const user = JSON.parse(localStorage.getItem("goloUser") || "null");
      if (!user || !user.signedIn) {
        window.location.href = "login.html";
      }

      const order = JSON.parse(localStorage.getItem("goloOrder") || "{}");
      const content = document.getElementById("content");

      const statuses = [
        "Order received",
        "Store preparing order",
        "Courier assigned",
        "Out for delivery",
        "Delivered"
      ];

      let currentStatusIndex = Number(localStorage.getItem("goloStatusIndex") || "0");

      function money(v) {
        return `$${Number(v || 0).toFixed(2)}`;
      }

      function etaText() {
        if ((order.deliveryType || "").toLowerCase() === "express") {
          return currentStatusIndex >= 4 ? "Delivered" : "ETA: under 1 hour";
        }
        return currentStatusIndex >= 4 ? "Delivered" : "ETA: 2–3 hours";
      }

      function courierPosition(index) {
        const positions = [
          { left: "60px", top: "50px" },
          { left: "95px", top: "55px" },
          { left: "190px", top: "58px" },
          { left: "265px", top: "150px" },
          { left: "370px", top: "178px" }
        ];
        return positions[index] || positions[0];
      }

      function render() {
        if (!order.items || !order.items.length) {
          content.innerHTML = `
            <div class="card">
              <div class="store-name">No active order</div>
              <div class="muted">Place an order first to see live tracking.</div>
              <button class="btn" onclick="window.location.href='index.html'">Go to Homepage</button>
            </div>
          `;
          return;
        }

        content.innerHTML = `
          <div class="card">
            <div class="store-name">${order.storeName || "GOLO Store"}</div>
            <div class="muted">${user.name} • ${order.deliveryType === "express" ? "Express" : "Priority"} • ${etaText()}</div>
            <div class="status-pill">${statuses[currentStatusIndex]}</div>
          </div>

          <div class="card">
            <div style="font-size:20px;font-weight:900;margin-bottom:12px;">Live Map</div>
            <div class="map">
              <div class="road h1"></div>
              <div class="road h2"></div>
              <div class="road v1"></div>
              <div class="road v2"></div>

              <div class="pin store-pin">🏬</div>
              <div class="pin home-pin">🏠</div>
              <div class="courier" id="courier">🛵</div>
            </div>
            <div class="muted" style="margin-top:12px;">Courier Maya is moving in real time for demo purposes.</div>
          </div>

          <div class="card">
            <div style="font-size:20px;font-weight:900;margin-bottom:12px;">Order Summary</div>
            ${(order.items || []).map(item => `
              <div class="summary-item">
                <span>${item.name}</span>
                <strong>${money(item.price)}</strong>
              </div>
            `).join("")}
            <div class="summary-item" style="margin-top:12px;">
              <span>Subtotal</span>
              <strong>${money(order.subtotal)}</strong>
            </div>
            <div class="summary-item">
              <span>Delivery</span>
              <strong>${money(order.deliveryFee)}</strong>
            </div>
            <div class="summary-item">
              <span>Total</span>
              <strong>${money(order.total)}</strong>
            </div>
          </div>

          <button class="btn" onclick="advanceStatus()">Advance Demo Status</button>
          <button class="btn secondary" onclick="logout()">Log Out</button>
        `;

        const courier = document.getElementById("courier");
        const pos = courierPosition(currentStatusIndex);
        courier.style.left = pos.left;
        courier.style.top = pos.top;
      }

      function advanceStatus() {
        if (currentStatusIndex < statuses.length - 1) {
          currentStatusIndex += 1;
          localStorage.setItem("goloStatusIndex", String(currentStatusIndex));
          render();
        }
      }

      function logout() {
        localStorage.removeItem("goloUser");
        window.location.href = "login.html";
      }

      render();
    </script>
  </body>
</html>
