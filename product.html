<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GOLO Product</title>
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0a0a0a;
        color: #111;
      }
      .app {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        background: #f7f7f7;
        padding-bottom: 110px;
      }
      .header {
        background: linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.65)),
                    linear-gradient(135deg, #111, #2a2a2a);
        color: white;
        padding: 18px 18px 26px;
        border-bottom-left-radius: 28px;
        border-bottom-right-radius: 28px;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .back {
        color: white;
        text-decoration: none;
        font-size: 14px;
        font-weight: 700;
      }
      .logo {
        height: 30px;
      }
      .product-image-wrap {
        background: white;
        border-radius: 24px;
        overflow: hidden;
        margin: 18px;
        box-shadow: 0 10px 30px rgba(0,0,0,.08);
      }
      .product-image {
        width: 100%;
        height: 360px;
        object-fit: cover;
        display: block;
        background: #eee;
      }
      .section {
        padding: 0 18px 18px;
      }
      .title {
        font-size: 28px;
        font-weight: 900;
        margin: 0 0 8px;
      }
      .brand {
        color: #6b7280;
        font-size: 14px;
        margin-bottom: 10px;
      }
      .price {
        font-size: 24px;
        font-weight: 900;
        margin-bottom: 14px;
      }
      .desc {
        color: #4b5563;
        font-size: 14px;
        line-height: 1.5;
        margin-bottom: 18px;
      }
      .label {
        font-size: 14px;
        font-weight: 800;
        margin-bottom: 10px;
      }
      .sizes {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }
      .size-btn {
        border: 1px solid #d1d5db;
        background: white;
        border-radius: 14px;
        padding: 12px 16px;
        font-weight: 800;
        cursor: pointer;
      }
      .size-btn.active {
        background: #111;
        color: white;
        border-color: #111;
      }
      .delivery-box {
        background: white;
        border-radius: 20px;
        padding: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,.06);
        margin-bottom: 18px;
      }
      .delivery-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-size: 14px;
      }
      .bottom-bar {
        position: fixed;
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%);
        width: min(448px, calc(100% - 24px));
        background: rgba(17,17,17,.96);
        color: white;
        border-radius: 22px;
        padding: 14px;
        display: flex;
        gap: 10px;
        box-shadow: 0 16px 40px rgba(0,0,0,.28);
      }
      .btn {
        border: 0;
        border-radius: 16px;
        padding: 15px;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
      }
      .btn.secondary {
        background: white;
        color: #111;
        width: 36%;
      }
      .btn.primary {
        background: #16a34a;
        color: white;
        width: 64%;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="header">
        <div class="topbar">
          <a class="back" href="store.html?store=pacsun">← Back</a>
          <img src="./logo.png" alt="GOLO logo" class="logo" />
        </div>
      </div>

      <div class="product-image-wrap">
        <img
          class="product-image"
          src="https://www.pacsun.com/on/demandware.static/-/Sites-pacsun-master/default/dw6e3c6a/images/large/0193519270036_367.jpg"
          alt="Obscura Cropped Zip Hoodie"
        />
      </div>

      <div class="section">
        <div class="brand">PacSun</div>
        <h1 class="title">Obscura Cropped Zip Hoodie</h1>
        <div class="price">$64.95</div>
        <div class="desc">
          Heather gray cropped full-zip hoodie styled as a premium streetwear delivery item for the GOLO demo.
        </div>

        <div class="label">Select size</div>
        <div class="sizes">
          <button class="size-btn" onclick="selectSize(this, 'S')">S</button>
          <button class="size-btn active" onclick="selectSize(this, 'M')">M</button>
          <button class="size-btn" onclick="selectSize(this, 'L')">L</button>
          <button class="size-btn" onclick="selectSize(this, 'XL')">XL</button>
        </div>

        <div class="delivery-box">
          <div class="delivery-row"><span>Express</span><strong>Within 1 hour</strong></div>
          <div class="delivery-row"><span>Priority</span><strong>2–3 hours</strong></div>
          <div class="delivery-row"><span>Delivery fee</span><strong>Calculated at checkout</strong></div>
        </div>
      </div>
    </div>

    <div class="bottom-bar">
      <button class="btn secondary" onclick="window.location.href='store.html?store=pacsun'">Store</button>
      <button class="btn primary" onclick="addProduct()">Add to Cart</button>
    </div>

    <script>
      let selectedSize = "M";

      function selectSize(el, size) {
        selectedSize = size;
        document.querySelectorAll(".size-btn").forEach(btn => btn.classList.remove("active"));
        el.classList.add("active");
      }

      function addProduct() {
        const cart = JSON.parse(localStorage.getItem("goloCart") || "[]");

        cart.push({
          name: "Obscura Cropped Zip Hoodie",
          desc: `Heather gray cropped full-zip hoodie • Size ${selectedSize}`,
          price: 64.95,
          image: "https://www.pacsun.com/on/demandware.static/-/Sites-pacsun-master/default/dw6e3c6a/images/large/0193519270036_367.jpg",
          storeKey: "pacsun",
          storeName: "PacSun",
          size: selectedSize
        });

        localStorage.setItem("goloCart", JSON.stringify(cart));
        alert(`Added to cart — Size ${selectedSize}`);
        window.location.href = "store.html?store=pacsun";
      }
    </script>
  </body>
</html>
